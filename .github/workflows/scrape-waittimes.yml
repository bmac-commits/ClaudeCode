name: Scrape Yosemite Wait Times

on:
  workflow_dispatch:
  # Scraper runs locally via macOS LaunchAgent (residential IP bypasses Cloudflare)
  # schedule disabled

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install curl_cffi

      - name: Run scraper
        run: python scrape_waittimes.py
        continue-on-error: true

      - name: Commit wait_times.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wait_times.json
          if git diff --cached --quiet; then
            echo "No changes to wait_times.json"
          else
            git commit -m "chore: update wait times [skip ci]"
            git push
          fi
