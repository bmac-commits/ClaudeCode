<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>National Parks Trip Dashboards</title>
  <style>
    :root {
      --bg: #08080a;
      --surface: #151517;
      --surface-hover: #1c1c1f;
      --border: rgba(255,255,255,0.09);
      --border-hover: rgba(255,255,255,0.2);
      --text: #f5f5f7;
      --text-dim: #a1a1a6;
      --text-faint: #6e6e73;

      --green: #4ade80;
      --orange: #fb923c;
      --amber: #fbbf24;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-font-smoothing: antialiased; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      padding: 120px 24px 64px;
      text-align: center;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -280px;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 560px;
      background:
        radial-gradient(circle at 30% 40%, rgba(74,222,128,0.22), transparent 55%),
        radial-gradient(circle at 68% 35%, rgba(251,146,60,0.22), transparent 55%),
        radial-gradient(circle at 50% 65%, rgba(251,191,36,0.18), transparent 55%);
      filter: blur(40px);
      pointer-events: none;
    }

    .eyebrow {
      position: relative;
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 20px;
      animation: fadeUp 0.6s ease both;
    }

    .hero h1 {
      position: relative;
      font-size: clamp(2.4rem, 6vw, 4.6rem);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1.05;
      margin-bottom: 20px;
      animation: fadeUp 0.6s ease 0.05s both;
    }

    .hero h1 .grad {
      background: linear-gradient(90deg, var(--green), var(--orange) 50%, var(--amber));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-sub {
      position: relative;
      font-size: clamp(1rem, 1.6vw, 1.2rem);
      color: var(--text-dim);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.5;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Search ── */
    .search-wrap {
      max-width: 480px;
      margin: 40px auto 0;
      animation: fadeUp 0.6s ease 0.15s both;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 16px;
      color: var(--text-dim);
      transition: border-color 0.2s;
    }

    .search-box:focus-within { border-color: var(--orange); color: var(--text); }

    .search-box input {
      appearance: none;
      border: none;
      background: transparent;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 0.92rem;
      flex: 1;
      min-width: 0;
    }

    .search-box input::placeholder { color: var(--text-faint); }

    .search-clear {
      appearance: none;
      border: none;
      background: var(--surface-hover);
      color: var(--text-dim);
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }

    .search-clear:hover { background: var(--border-hover); color: var(--text); }
    .search-clear[hidden] { display: none; }

    .search-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
      font-size: 0.76rem;
      color: var(--text-faint);
    }

    /* ── State filter tabs ── */
    .tabs {
      display: flex;
      gap: 6px;
      margin: 18px auto 0;
      padding: 5px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      width: fit-content;
      max-width: 100%;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 9px 20px;
      border-radius: 100px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .tab:hover { color: var(--text); }

    .tab.active {
      background: var(--text);
      color: #0a0a0a;
    }

    /* ── Grid ── */
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 56px 24px 100px;
    }

    .park-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-dim);
      font-size: 0.95rem;
    }

    .pc {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      transition: transform 0.35s cubic-bezier(.2,.8,.2,1), border-color 0.3s, box-shadow 0.35s;
      animation: fadeUp 0.6s ease both;
    }

    .pc:hover {
      transform: translateY(-4px);
      border-color: var(--border-hover);
      box-shadow: 0 14px 36px -18px color-mix(in srgb, var(--accent) 55%, transparent);
    }

    .pc-media {
      position: relative;
      height: 60px;
      background: var(--grad);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .pc-media::before {
      content: '';
      position: absolute;
      top: -30%;
      left: -20%;
      width: 70%;
      height: 140%;
      background: radial-gradient(circle, rgba(255,255,255,0.28), transparent 65%);
      transition: transform 0.5s ease;
    }

    .pc:hover .pc-media::before {
      transform: translate(20px, 10px) scale(1.1);
    }

    .pc-media svg {
      width: 26px;
      height: 26px;
      position: relative;
      transition: transform 0.35s cubic-bezier(.2,.8,.2,1);
    }

    .pc:hover .pc-media svg {
      transform: scale(1.08) translateY(-2px);
    }

    .pc-state {
      position: absolute;
      top: 7px;
      left: 7px;
      font-size: 0.5rem;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #fff;
      background: rgba(0,0,0,0.28);
      backdrop-filter: blur(6px);
      padding: 2px 6px;
      border-radius: 100px;
    }

    .pc-body {
      padding: 9px 11px 11px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
    }

    .pc-name {
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .pc-name span {
      display: none;
    }

    .pc-desc {
      display: none;
    }

    .pc-features {
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.2px;
      text-transform: none;
      color: var(--text-dim);
      flex: 1;
    }

    .pc-cta {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent);
      margin-top: 3px;
    }

    .pc-cta svg {
      transition: transform 0.25s cubic-bezier(.2,.8,.2,1);
    }

    .pc:hover .pc-cta svg {
      transform: translateX(5px);
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 28px 24px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-faint);
    }

    @media (max-width: 640px) {
      .hero { padding: 88px 20px 48px; }
      .tabs { width: calc(100% - 40px); justify-content: flex-start; }
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="eyebrow">Trip Planning · Live Data</div>

      <input type="text" id="search" placeholder="Search parks, states, or features…" autocomplete="off" />
      <button id="searchClear" class="search-clear" aria-label="Clear search" hidden>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="search-meta">
      <span id="resultHint">Showing all 46 parks</span>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>
</div>

<main>
  <div class="park-grid" id="grid"></div>
</main>

<footer>
  Live data from the National Park Service, Open-Meteo &amp; USGS. &middot; <a href="status.html" style="color: inherit;">Dashboard status &#8599;</a>
</footer>

  const TABS = ['All Parks', 'California', 'Nevada', 'Oregon', 'Washington', 'Arizona', 'Idaho', 'Montana', 'Utah', 'Wyoming', 'Tennessee', 'North Carolina', 'Colorado', 'Texas', 'Maine', 'Virginia', 'Alaska', 'Hawaii', 'Florida', 'Ohio', 'Arkansas', 'Indiana', 'Kentucky', 'Michigan', 'Minnesota', 'Missouri', 'New Mexico', 'North Dakota', 'South Carolina'];
  let activeTab = 'All Parks';
  let searchQuery = '';

  function arrowIcon() {
    return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
  }

  const STATE_ABBR = {
    'California': 'CA', 'Nevada': 'NV', 'Oregon': 'OR', 'Washington': 'WA',
    'Arizona': 'AZ', 'Idaho': 'ID', 'Montana': 'MT', 'Utah': 'UT', 'Wyoming': 'WY',
    'Tennessee': 'TN', 'North Carolina': 'NC', 'Colorado': 'CO', 'Texas': 'TX',
    'Maine': 'ME', 'Virginia': 'VA', 'Alaska': 'AK', 'Hawaii': 'HI',
    'Florida': 'FL', 'Ohio': 'OH', 'Arkansas': 'AR', 'Indiana': 'IN',
    'Kentucky': 'KY', 'Michigan': 'MI', 'Minnesota': 'MN', 'Missouri': 'MO',
    'New Mexico': 'NM', 'North Dakota': 'ND', 'South Carolina': 'SC',
  };

  function stateLabel(states) {
    return states.length > 1 ? states.map(s => STATE_ABBR[s] || s).join(' · ') : states[0];
  }

  function renderTabs() {
    const tabs = document.getElementById('tabs');
    tabs.innerHTML = TABS.map(t =>
      `<button class="tab${t === activeTab ? ' active' : ''}" data-tab="${t}">${t}</button>`
    ).join('');
    tabs.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab;
        searchQuery = '';
        searchInput.value = '';
        searchClearBtn.hidden = true;
        renderTabs();
        renderGrid();
      });
    });
  }

  function renderCard(park, i) {
    return `
      <a class="pc" style="--accent:${park.accent}; --grad:${park.grad}; animation-delay:${i * 0.06}s" href="${park.href}">
        <div class="pc-media" style="background:${park.grad}">
          <span class="pc-state">${stateLabel(park.states)}</span>
          ${park.icon}
        </div>
        <div class="pc-body">
          <div class="pc-name">${park.name}<span>National Park</span></div>
          <div class="pc-desc">${park.desc}</div>
          <div class="pc-features">${park.features}</div>
          <div class="pc-cta">View Dashboard ${arrowIcon()}</div>
        </div>
      </a>`;
  }

  function matchesQuery(park, q) {
    const haystack = [park.name, ...park.states, park.desc, park.features].join(' ').toLowerCase();
    return haystack.includes(q);
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    const hint = document.getElementById('resultHint');
    const q = searchQuery.trim().toLowerCase();

    let parks;
    if (q) {
      parks = PARKS.filter(p => matchesQuery(p, q));
      hint.textContent = `${parks.length} match${parks.length === 1 ? '' : 'es'} for "${searchQuery.trim()}"`;
    } else {
      parks = activeTab === 'All Parks' ? PARKS : PARKS.filter(p => p.states.includes(activeTab));
      hint.textContent = activeTab === 'All Parks' ? `Showing all ${PARKS.length} parks` : `Showing ${parks.length} park${parks.length === 1 ? '' : 's'} in ${activeTab}`;
    }

    grid.innerHTML = parks.length
      ? parks.map(renderCard).join('')
      : `<div class="empty-state">No parks match "${searchQuery.trim()}" — try a park name, state, or feature like "volcano" or "glacier".</div>`;
  }

  const searchInput = document.getElementById('search');
  const searchClearBtn = document.getElementById('searchClear');

  searchInput.addEventListener('input', () => {
    searchQuery = searchInput.value;
    searchClearBtn.hidden = searchQuery.length === 0;
    renderGrid();
  });

  searchClearBtn.addEventListener('click', () => {
    searchQuery = '';
    searchInput.value = '';
    searchClearBtn.hidden = true;
    searchInput.focus();
    renderGrid();
  });

  renderTabs();
  renderGrid();
</script>
</body>
</html>
