<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>National Parks Trip Dashboards</title>
  <style>
    :root {
      --bg: #08080a;
      --surface: #151517;
      --surface-hover: #1c1c1f;
      --border: rgba(255,255,255,0.09);
      --border-hover: rgba(255,255,255,0.2);
      --text: #f5f5f7;
      --text-dim: #a1a1a6;
      --text-faint: #6e6e73;

      --green: #4ade80;
      --orange: #fb923c;
      --amber: #fbbf24;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-font-smoothing: antialiased; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      padding: 120px 24px 64px;
      text-align: center;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -280px;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 560px;
      background:
        radial-gradient(circle at 30% 40%, rgba(74,222,128,0.22), transparent 55%),
        radial-gradient(circle at 68% 35%, rgba(251,146,60,0.22), transparent 55%),
        radial-gradient(circle at 50% 65%, rgba(251,191,36,0.18), transparent 55%);
      filter: blur(40px);
      pointer-events: none;
    }

    .eyebrow {
      position: relative;
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 20px;
      animation: fadeUp 0.6s ease both;
    }

    .hero h1 {
      position: relative;
      font-size: clamp(2.4rem, 6vw, 4.6rem);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1.05;
      margin-bottom: 20px;
      animation: fadeUp 0.6s ease 0.05s both;
    }

    .hero h1 .grad {
      background: linear-gradient(90deg, var(--green), var(--orange) 50%, var(--amber));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-sub {
      position: relative;
      font-size: clamp(1rem, 1.6vw, 1.2rem);
      color: var(--text-dim);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.5;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── State filter tabs ── */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin: 40px auto 0;
      padding: 5px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      width: fit-content;
      animation: fadeUp 0.6s ease 0.15s both;
    }

    .tab {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 9px 20px;
      border-radius: 100px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .tab:hover { color: var(--text); }

    .tab.active {
      background: var(--text);
      color: #0a0a0a;
    }

    /* ── Grid ── */
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 56px 24px 100px;
    }

    .park-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 22px;
    }

    .pc {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      transition: transform 0.35s cubic-bezier(.2,.8,.2,1), border-color 0.3s, box-shadow 0.35s;
      animation: fadeUp 0.6s ease both;
    }

    .pc:hover {
      transform: translateY(-6px);
      border-color: var(--border-hover);
      box-shadow: 0 20px 50px -20px color-mix(in srgb, var(--accent) 55%, transparent);
    }

    .pc-media {
      position: relative;
      height: 190px;
      background: var(--grad);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .pc-media::before {
      content: '';
      position: absolute;
      top: -30%;
      left: -20%;
      width: 70%;
      height: 140%;
      background: radial-gradient(circle, rgba(255,255,255,0.28), transparent 65%);
      transition: transform 0.5s ease;
    }

    .pc:hover .pc-media::before {
      transform: translate(20px, 10px) scale(1.1);
    }

    .pc-media svg {
      width: 68px;
      height: 68px;
      position: relative;
      transition: transform 0.35s cubic-bezier(.2,.8,.2,1);
    }

    .pc:hover .pc-media svg {
      transform: scale(1.08) translateY(-2px);
    }

    .pc-state {
      position: absolute;
      top: 14px;
      left: 14px;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #fff;
      background: rgba(0,0,0,0.28);
      backdrop-filter: blur(6px);
      padding: 5px 10px;
      border-radius: 100px;
    }

    .pc-body {
      padding: 22px 22px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .pc-name {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.4px;
    }

    .pc-name span {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-top: 3px;
    }

    .pc-desc {
      font-size: 0.85rem;
      color: var(--text-dim);
      line-height: 1.55;
      flex: 1;
    }

    .pc-features {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    .pc-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent);
      margin-top: 4px;
    }

    .pc-cta svg {
      transition: transform 0.25s cubic-bezier(.2,.8,.2,1);
    }

    .pc:hover .pc-cta svg {
      transform: translateX(5px);
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 28px 24px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-faint);
    }

    @media (max-width: 640px) {
      .hero { padding: 88px 20px 48px; }
      .tabs { flex-wrap: wrap; width: calc(100% - 40px); justify-content: center; }
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="eyebrow">Trip Planning · Live Data</div>
  <h1>National Parks.<br><span class="grad">All in one place.</span></h1>
  <p class="hero-sub">Real-time weather, NPS alerts, and live cameras — pick a park to see current conditions.</p>

  <div class="tabs" id="tabs"></div>
</div>

<main>
  <div class="park-grid" id="grid"></div>
</main>

<footer>
  Live data from the National Park Service, Open-Meteo &amp; USGS.
</footer>

<script>
  const ICONS = {
    yosemite: `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M6 76 L34 32 L50 56 L64 26 L94 76 Z" fill="#fff" opacity="0.95"/>
      <path d="M50 56l-6 9h12z" fill="#fff" opacity="0.35"/>
    </svg>`,
    joshuaTree: `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="50" y1="18" x2="50" y2="86" stroke="#fff" stroke-width="5.5" stroke-linecap="round"/>
      <path d="M50 30c-11-3-17-14-13-24" stroke="#fff" stroke-width="5.5" fill="none" stroke-linecap="round" opacity="0.9"/>
      <path d="M50 39c11-3 17-14 13-24" stroke="#fff" stroke-width="5.5" fill="none" stroke-linecap="round" opacity="0.9"/>
      <path d="M50 48c-13-3-20-12-20-22" stroke="#fff" stroke-width="5.5" fill="none" stroke-linecap="round" opacity="0.7"/>
      <path d="M50 53c13-3 20-12 20-22" stroke="#fff" stroke-width="5.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    </svg>`,
    deathValley: `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="34" r="17" fill="#fff" opacity="0.95"/>
      <path d="M8 80c11-7 21-7 31 0s21 7 31 0s21-7 22 0" stroke="#fff" stroke-width="5.5" fill="none" stroke-linecap="round" opacity="0.85"/>
    </svg>`,
  };

  const PARKS = [
    {
      name: 'Yosemite',
      states: ['California'],
      accent: '#4ade80',
      grad: 'linear-gradient(135deg, #0f4d33 0%, #1f8a52 55%, #3fbf72 100%)',
      icon: ICONS.yosemite,
      desc: 'Valley traffic & wait times, shuttle & bike rentals, river flow for anglers, and a full grid of live cameras including Half Dome.',
      features: 'Live Cams · Traffic · River Flow',
      href: 'yosemite_cams.html',
    },
    {
      name: 'Joshua Tree',
      states: ['California'],
      accent: '#fb923c',
      grad: 'linear-gradient(135deg, #7c2d12 0%, #c2410c 55%, #f0703a 100%)',
      icon: ICONS.joshuaTree,
      desc: 'Entrance info, fire restrictions, campground availability, climbing areas & trailheads, and Dark Sky stargazing conditions.',
      features: 'Stargazing · Climbing · Campgrounds',
      href: 'joshua_tree_cams.html',
    },
    {
      name: 'Death Valley',
      states: ['California', 'Nevada'],
      accent: '#fbbf24',
      grad: 'linear-gradient(135deg, #7c3d0a 0%, #c2760f 55%, #f2b33d 100%)',
      icon: ICONS.deathValley,
      desc: 'Extreme heat safety guidance, entrance & campground info, landmark guide, Gold-Tier Dark Sky stargazing, and a live Furnace Creek cam.',
      features: 'Heat Safety · Live Cam · Landmarks',
      href: 'death_valley_cams.html',
    },
  ];

  const TABS = ['All Parks', 'California', 'Nevada'];
  let activeTab = 'All Parks';

  function arrowIcon() {
    return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
  }

  function stateLabel(states) {
    return states.length > 1 ? states.map(s => s === 'California' ? 'CA' : 'NV').join(' · ') : states[0];
  }

  function renderTabs() {
    const tabs = document.getElementById('tabs');
    tabs.innerHTML = TABS.map(t =>
      `<button class="tab${t === activeTab ? ' active' : ''}" data-tab="${t}">${t}</button>`
    ).join('');
    tabs.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab;
        renderTabs();
        renderGrid();
      });
    });
  }

  function renderCard(park, i) {
    return `
      <a class="pc" style="--accent:${park.accent}; --grad:${park.grad}; animation-delay:${i * 0.06}s" href="${park.href}">
        <div class="pc-media" style="background:${park.grad}">
          <span class="pc-state">${stateLabel(park.states)}</span>
          ${park.icon}
        </div>
        <div class="pc-body">
          <div class="pc-name">${park.name}<span>National Park</span></div>
          <div class="pc-desc">${park.desc}</div>
          <div class="pc-features">${park.features}</div>
          <div class="pc-cta">View Dashboard ${arrowIcon()}</div>
        </div>
      </a>`;
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    const parks = activeTab === 'All Parks'
      ? PARKS
      : PARKS.filter(p => p.states.includes(activeTab));
    grid.innerHTML = parks.map(renderCard).join('');
  }

  renderTabs();
  renderGrid();
</script>
</body>
</html>
