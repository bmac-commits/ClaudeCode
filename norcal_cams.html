<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NorCal Surf Cams</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a1628;
      color: #e0e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      padding: 12px 20px;
      background: linear-gradient(135deg, #0d2545, #1a3a5c);
      border-bottom: 1px solid #1e4d7b;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; color: #39d353; letter-spacing: 0.04em; }
    header span { font-size: 0.82rem; color: #5a8fa8; }

    .main { flex: 1; display: flex; overflow: hidden; position: relative; }
    #map { flex: 1; }

    /* ── Side Panel ── */
    #panel {
      width: 360px;
      flex-shrink: 0;
      background: #0d2040;
      border-left: 1px solid #1e4d7b;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.22s ease;
      position: absolute;
      right: 0; top: 0; bottom: 0;
      z-index: 500;
    }
    #panel.open { transform: translateX(0); }

    .panel-close {
      position: absolute;
      top: 10px; right: 12px;
      background: none; border: none;
      color: #5a8fa8; font-size: 1.2rem;
      cursor: pointer; padding: 4px; line-height: 1;
    }
    .panel-close:hover { color: #e0e8f0; }

    .panel-header {
      padding: 16px 40px 12px 16px;
      border-bottom: 1px solid #1a3a5c;
      flex-shrink: 0;
    }
    .panel-title { font-size: 1rem; font-weight: 600; color: #39d353; margin-bottom: 2px; }
    .panel-sub { font-size: 0.73rem; color: #5a8fa8; }

    /* ── Media area ── */
    .media-wrap {
      position: relative;
      background: #060f1e;
      flex-shrink: 0;
      height: 202px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .media-wrap .cam-img {
      width: 100%; height: 202px;
      display: block; object-fit: cover; border: none;
    }
    .media-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: #5a8fa8;
      font-size: 0.82rem;
      text-align: center;
      padding: 20px;
      width: 100%;
    }
    .media-placeholder svg { opacity: 0.35; }
    .open-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      background: #142d50;
      border: 1px solid #1e4d7b;
      border-radius: 20px;
      font-size: 0.75rem;
      color: #39d353;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }

    .refresh-badge {
      position: absolute; bottom: 8px; right: 8px;
      background: rgba(10,22,40,0.85);
      border: 1px solid #1e4d7b; border-radius: 4px;
      padding: 2px 7px; font-size: 0.68rem; color: #5a8fa8;
    }

    /* ── Panel body ── */
    .panel-body { flex: 1; overflow-y: auto; padding: 14px 16px; }
    .panel-desc { font-size: 0.82rem; color: #b0c8d8; line-height: 1.5; margin-bottom: 14px; }

    .surf-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .tag {
      padding: 3px 9px; border-radius: 12px; font-size: 0.72rem;
      background: #0f2540; border: 1px solid #1e4d7b; color: #7ec8e3;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 5px;
      font-size: 0.78rem; text-decoration: none;
      cursor: pointer; border: none; transition: background 0.15s;
    }
    .btn-primary { background: #1a3d20; border: 1px solid #39d353; color: #39d353; }
    .btn-primary:hover { background: #224d28; }

    /* ── Legend ── */
    .legend {
      background: rgba(10,22,40,0.92);
      border: 1px solid #1e4d7b;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 0.76rem;
    }
    .legend h4 { color: #39d353; margin-bottom: 7px; font-size: 0.78rem; letter-spacing: 0.05em; text-transform: uppercase; }
    .legend-row { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; color: #b0c8d8; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    .leaflet-popup-content-wrapper { display: none; }
  </style>
</head>
<body>

<header>
  <h1>NorCal Surf Cams</h1>
  <span>— click any spot to open live feed</span>
</header>

<div class="main">
  <div id="map"></div>

  <div id="panel">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div class="panel-header">
      <div class="panel-title" id="panel-title">—</div>
      <div class="panel-sub" id="panel-sub">—</div>
    </div>
    <div class="media-wrap" id="media-wrap"></div>
    <div class="panel-body">
      <div class="surf-tags" id="surf-tags"></div>
      <div class="panel-desc" id="panel-desc"></div>
      <a class="btn btn-primary" id="panel-link" href="#" target="_blank">Open Cam in Full Tab ↗</a>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map', { center: [38.6, -123.0], zoom: 8, zoomControl: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(map);

  // embed types:
  //   { type:'img', url, refresh }  — direct snapshot image, refreshes in-panel
  //   { type:'newtab' }             — site blocks iframes; auto-opens new tab on click

  const spots = [
    {
      name: "Steamer Lane",
      sub: "Santa Cruz",
      lat: 36.9508, lng: -122.0264,
      tags: ["Point break", "Left", "All levels", "Consistent"],
      desc: "California's most celebrated break. World-class left with multiple sections from Indicators down to The Slot. Best on mid NW swell, works all tides.",
      url: "https://www.youtube.com/watch?v=bNLy-XXYxcw",
      embed: { type: 'youtube', videoId: 'bNLy-XXYxcw' }
    },
    {
      name: "Mavericks — South View",
      sub: "Half Moon Bay",
      lat: 37.4935, lng: -122.5003,
      tags: ["Big wave", "Reef break", "Expert only", "NW swell"],
      desc: "World-renowned big wave reef off Pillar Point. Direct MJPEG stream from Sam's Chowder House rooftop looking south toward Mavericks. Camera comes online periodically.",
      url: "https://www.iplivecams.com/live-cams/sams-chowder-house-rooftop-south-view-half-moon-bay-california-united-states/",
      embed: { type: 'mjpeg', url: 'https://samcam2.samschowderhouse.com:20002/axis-cgi/mjpg/video.cgi?resolution=640x480' }
    },
    {
      name: "Mavericks — North View",
      sub: "Half Moon Bay",
      lat: 37.4950, lng: -122.4990,
      tags: ["Big wave", "Pillar Point", "North angle"],
      desc: "Second Sam's Chowder House rooftop angle looking north across Pillar Point Harbor. Good for reading swell direction and wind. Camera comes online periodically.",
      url: "https://www.iplivecams.com/live-cams/sams-chowder-house-rooftop-north-view-half-moon-bay-california-united-states/",
      embed: { type: 'mjpeg', url: 'https://samcam1.samschowderhouse.com:20001/axis-cgi/mjpg/video.cgi?resolution=640x480' }
    },
    {
      name: "Pacifica Pier",
      sub: "Pacifica",
      lat: 37.6036, lng: -122.4961,
      tags: ["Beach break", "Pier view", "Sharp Park", "Consistent"],
      desc: "SkylineWebcams YouTube Live at Pacifica Pier overlooking Sharp Park Beach — a consistent beach break that works on most NW swells.",
      url: "https://www.skylinewebcams.com/en/webcam/united-states/california/pacifica/pier.html",
      embed: { type: 'youtube', videoId: '16hHfZzf8-I' }
    },
    {
      name: "Sharp Park Beach",
      sub: "Pacifica",
      lat: 37.6010, lng: -122.4980,
      tags: ["Beach break", "4K Live", "Consistent", "NW swell"],
      desc: "Chamberlin Nature 4K live cam looking directly at Sharp Park Beach — one of the most consistent beach breaks near SF. Works on most NW/W swells.",
      url: "https://www.youtube.com/watch?v=Xy2sgld2m8E",
      embed: { type: 'youtube', videoId: 'Xy2sgld2m8E' }
    },
    {
      name: "Mori Point",
      sub: "Pacifica",
      lat: 37.5940, lng: -122.4970,
      tags: ["Beach break", "4K Live", "South Pacifica", "Scenic"],
      desc: "Chamberlin Nature 4K live cam at Mori Point — south end of Pacifica. Shows the open coast south of Sharp Park and is a good read on swell size and direction.",
      url: "https://www.youtube.com/watch?v=UYu-TjvAVFs",
      embed: { type: 'youtube', videoId: 'UYu-TjvAVFs' }
    },
    {
      name: "Pacifica Pier & Beach",
      sub: "Pacifica",
      lat: 37.6050, lng: -122.4965,
      tags: ["Beach break", "4K Live", "Second angle", "Chamberlin Nature"],
      desc: "Chamberlin Nature 4K live cam of Pacifica Pier and beach from a different angle than the SkylineWebcams feed — good for a fuller read of the break.",
      url: "https://www.youtube.com/watch?v=eYdiUX8mPM8",
      embed: { type: 'youtube', videoId: 'eYdiUX8mPM8' }
    },
  ];

  let _refreshInterval = null;

  function clearRefresh() {
    if (_refreshInterval) { clearInterval(_refreshInterval); _refreshInterval = null; }
  }

  function closePanel() {
    clearRefresh();
    document.getElementById('panel').classList.remove('open');
    document.getElementById('media-wrap').innerHTML = '';
  }

  function openSpot(spot) {
    clearRefresh();

    document.getElementById('panel-title').textContent = spot.name;
    document.getElementById('panel-sub').textContent = spot.sub;
    document.getElementById('panel-desc').textContent = spot.desc;

    const link = document.getElementById('panel-link');
    link.href = spot.url;

    const tagsEl = document.getElementById('surf-tags');
    tagsEl.innerHTML = spot.tags.map(t => `<span class="tag">${t}</span>`).join('');

    const wrap = document.getElementById('media-wrap');
    wrap.innerHTML = '';

    if (spot.embed.type === 'youtube') {
      const iframe = document.createElement('iframe');
      iframe.style.cssText = 'width:100%;height:202px;border:none;display:block;';
      iframe.src = `https://www.youtube.com/embed/${spot.embed.videoId}?autoplay=1&mute=1`;
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
      iframe.allowFullscreen = true;
      iframe.title = spot.name;
      wrap.appendChild(iframe);

    } else if (spot.embed.type === 'mjpeg') {
      // MJPEG streams work as <img> src — browser handles the multipart stream
      const img = document.createElement('img');
      img.className = 'cam-img';
      img.src = spot.embed.url;
      img.alt = spot.name;
      img.onerror = () => { wrap.innerHTML = buildPlaceholder(spot, false); };
      wrap.appendChild(img);

    } else if (spot.embed.type === 'img') {
      const ts = () => `${spot.embed.url}?t=${Date.now()}`;
      const img = document.createElement('img');
      img.className = 'cam-img';
      img.src = ts();
      img.alt = spot.name;
      img.onerror = () => { wrap.innerHTML = buildPlaceholder(spot, false); };
      const badge = document.createElement('div');
      badge.className = 'refresh-badge';
      badge.textContent = `↻ ${spot.embed.refresh}s`;
      wrap.appendChild(img);
      wrap.appendChild(badge);
      _refreshInterval = setInterval(() => { img.src = ts(); }, spot.embed.refresh * 1000);

    } else {
      // newtab: open feed immediately + show placeholder
      window.open(spot.url, '_blank');
      wrap.innerHTML = buildPlaceholder(spot, true);
    }

    document.getElementById('panel').classList.add('open');
    setTimeout(() => map.invalidateSize(), 240);
  }

  function buildPlaceholder(spot, opened) {
    return `<div class="media-placeholder">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#39d353" stroke-width="1.2">
        <path d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.9L15 14"/>
        <rect x="2" y="8" width="13" height="8" rx="2"/>
      </svg>
      ${opened
        ? `<div class="open-badge">▶ Feed opened in new tab</div>`
        : `<span>Tap "Open Cam in Full Tab" below</span>`
      }
    </div>`;
  }

  function makeIcon() {
    return L.divIcon({
      className: '',
      html: `<svg width="24" height="30" viewBox="0 0 24 30" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="12" cy="28" rx="5" ry="2" fill="rgba(0,0,0,0.35)"/>
        <path d="M12 0 C6 0 1 5.1 1 11.4 C1 19.5 12 30 12 30 C12 30 23 19.5 23 11.4 C23 5.1 18 0 12 0Z"
              fill="#39d353" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
        <text x="12" y="15" font-size="10" text-anchor="middle" fill="rgba(0,40,0,0.9)" font-family="sans-serif">🏄</text>
      </svg>`,
      iconSize: [24, 30], iconAnchor: [12, 30], popupAnchor: [0, -32]
    });
  }

  spots.forEach(spot => {
    const marker = L.marker([spot.lat, spot.lng], { icon: makeIcon() });
    marker.on('click', () => openSpot(spot));
    marker.addTo(map);
  });

  // Legend / count
  const info = L.control({ position: 'topleft' });
  info.onAdd = function() {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML = `<h4>${spots.length} Surf Spots</h4>
      <div class="legend-row"><div class="legend-dot" style="background:#39d353"></div>Click to open live cam</div>`;
    return div;
  };
  info.addTo(map);
</script>
</body>
</html>
